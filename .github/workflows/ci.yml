name: CI

on:
  push:
  pull_request:
    branches: [master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-quality
      - run: cargo test --locked
      - run: cargo test --locked --test e2e
      - run: cargo clippy --locked -- -D warnings
      - run: cargo fmt --check

  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-${{ matrix.target }}
      - name: Install zig and cargo-zigbuild
        run: |
          curl -fsSL https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz | tar xJ -C /tmp
          echo "/tmp/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild
      - run: cargo zigbuild --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: mf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mf

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-build-macos
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v6
        with:
          name: mf-aarch64-apple-darwin
          path: target/release/mf
