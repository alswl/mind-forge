name: Release

on:
  push:
    tags: [v*]

permissions:
  contents: write

jobs:
  validate-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Validate version tag
        run: |
          TAG="${{ github.ref_name }}"
          if ! echo "$TAG" | grep -qP '^v[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?(\+[0-9A-Za-z.-]+)?$'; then
            echo "Invalid tag: $TAG"
            echo "Expected format: v<MAJOR>.<MINOR>.<PATCH>"
            exit 1
          fi

  build-linux:
    needs: [validate-tag]
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v5
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Install zig and cargo-zigbuild
        run: |
          curl -fsSL https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz | tar xJ -C /tmp
          echo "/tmp/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild
      - run: cargo zigbuild --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v6
        with:
          name: mf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mf

  build-macos:
    needs: [validate-tag]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v6
        with:
          name: mf-aarch64-apple-darwin
          path: target/release/mf

  create-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v7
        with:
          pattern: mf-*
          merge-multiple: true
          path: artifacts
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/*
          tag: ${{ github.ref_name }}
          draft: true
          generateReleaseNotes: true
          allowUpdates: true
          makeLatest: true
