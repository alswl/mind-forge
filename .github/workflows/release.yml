name: Release

on:
  push:
    tags: [v*]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}
      - name: Install zig and cargo-zigbuild
        run: |
          curl -fsSL https://ziglang.org/download/0.14.0/zig-linux-x86_64-0.14.0.tar.xz | tar xJ -C /tmp
          echo "/tmp/zig-linux-x86_64-0.14.0" >> "$GITHUB_PATH"
          cargo install cargo-zigbuild
      - run: cargo zigbuild --release --locked --target ${{ matrix.target }}
      - uses: actions/upload-artifact@v4
        with:
          name: mf-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/mf

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - run: cargo build --release --locked
      - uses: actions/upload-artifact@v4
        with:
          name: mf-aarch64-apple-darwin
          path: target/release/mf

  create-release:
    needs: [build-linux, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: mf-*
          merge-multiple: true
          path: artifacts
      - name: Create release
        uses: ncipollo/release-action@v1
        with:
          artifacts: artifacts/*
          generateReleaseNotes: true
          makeLatest: true
